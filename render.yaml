services:
  # Django Backend API
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed
    startCommand: gunicorn breathe_esg.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "breathe-esg-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg.onrender.com"

  # React Frontend
  - type: web
    name: breathe-esg
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-api.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg_user
    plan: free
